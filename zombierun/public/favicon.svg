<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Zombies-Run">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141c26"/>
      <stop offset="100%" stop-color="#0a0f14"/>
    </linearGradient>
    <linearGradient id="skin" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3d5a45"/>
      <stop offset="55%" stop-color="#2a4030"/>
      <stop offset="100%" stop-color="#1a2a1f"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Slasher slash -->
  <path d="M96 420 L416 92" stroke="#7f1d1d" stroke-width="44" stroke-linecap="round" opacity="0.35"/>
  <path d="M112 404 L400 108" stroke="#ef4444" stroke-width="18" stroke-linecap="round"/>

  <!-- Toxic haze -->
  <ellipse cx="256" cy="300" rx="190" ry="170" fill="#22c55e" opacity="0.07"/>

  <!-- Zombie skull -->
  <path
    fill="url(#skin)"
    d="M256 96
       C188 96 136 148 128 214
       C120 280 136 334 152 372
       C168 410 208 430 256 430
       C304 430 344 410 360 372
       C376 334 392 280 384 214
       C376 148 324 96 256 96Z"
  />

  <!-- Cranium cracks -->
  <path d="M210 150 L236 188 M302 150 L276 188 M256 118 L256 168" stroke="#1a2a1f" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- Sunken eye sockets -->
  <ellipse cx="206" cy="232" rx="52" ry="44" fill="#0a0f14"/>
  <ellipse cx="306" cy="232" rx="52" ry="44" fill="#0a0f14"/>

  <!-- Glowing eyes -->
  <circle cx="206" cy="232" r="22" fill="url(#eye-glow)" filter="url(#glow)"/>
  <circle cx="306" cy="232" r="22" fill="url(#eye-glow)" filter="url(#glow)"/>
  <circle cx="200" cy="226" r="7" fill="#dcfce7" opacity="0.85"/>

  <!-- Nose cavity -->
  <path d="M256 258 L242 296 L270 296 Z" fill="#0a0f14"/>

  <!-- Jagged teeth -->
  <path
    fill="#d4d4c8"
    d="M188 334
       L202 318 L216 336 L230 316 L244 336 L258 314 L272 336 L286 316 L300 336 L314 318 L324 334
       L324 372
       C304 392 276 404 256 404
       C236 404 208 392 188 372 Z"
  />
  <path d="M202 336 L216 352 M230 334 L244 354 M258 332 L272 354 M286 334 L300 352" stroke="#0a0f14" stroke-width="4" stroke-linecap="round"/>

  <!-- Blood drip -->
  <path d="M330 286 C330 306 338 318 338 334 C338 346 330 354 330 354 C330 354 322 346 322 334 C322 318 330 306 330 286Z" fill="#b91c1c"/>

  <!-- Running footprint (escape motif) -->
  <g fill="#22c55e" opacity="0.9">
    <ellipse cx="118" cy="392" rx="16" ry="22" transform="rotate(-28 118 392)"/>
    <circle cx="104" cy="364" r="9"/>
    <circle cx="122" cy="358" r="9"/>
    <circle cx="140" cy="364" r="9"/>
    <circle cx="128" cy="348" r="9"/>
    <circle cx="110" cy="348" r="9"/>
  </g>
</svg>
